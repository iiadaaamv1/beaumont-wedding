<!DOCTYPE html>
<html>

<title>Gallery</title>

</head>

<body>

<a class="home-button" href="index.html">← Home</a>

<div id="photoGrid" class="photo-grid"></div>

<div id="lightbox" class="lightbox">
  <button id="closeBtn" class="lightbox-close" type="button">×</button>
  <button id="prevBtn" class="lightbox-arrow lightbox-prev" type="button">‹</button>

  <div class="lightbox-content">
    <div id="imageName" class="image-name"></div>
    <img id="lightboxImg" alt="">
  </div>

  <button id="nextBtn" class="lightbox-arrow lightbox-next" type="button">›</button>
</div>

<script src="gallery.js?v=5"></script>
